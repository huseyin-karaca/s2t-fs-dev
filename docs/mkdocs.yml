site_name: S2T-FS
site_author: Hüseyin Karaca
repo_url: https://github.com/huseyin-karaca/s2t-fs-dev
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Experimental Design: experiments.md
  - Orchestration & Parallelism: experiment_orchestration.md
  - Transforms Rationale: synthetic_transforms_rationale.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
