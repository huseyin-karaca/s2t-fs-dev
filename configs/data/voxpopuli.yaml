dataset: voxpopuli

source:
  name: facebook/voxpopuli
  subset: en_accented
  split_name: test
  revision: refs/convert/parquet
  text_column: normalized_text
  sampling_rate: 16000

paths:
  raw_dir: data/raw
  interim_dir: data/interim/${data.dataset}/${data.source.subset}_${data.source.split_name}

row_subsample: 1
feature_subsample: 1
standard_normalize: true
seed: 42
test_size: 0.15
