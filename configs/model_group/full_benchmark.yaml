# The article's full benchmark: all 10 models.
# Each entry mounts a model/<name>.yaml under models.<Name> so the train_*.py
# code sees the same `models` dict it always has.
defaults:
  - /model@models.Dummy_0: dummy_0
  - /model@models.Dummy_1: dummy_1
  - /model@models.Dummy_2: dummy_2
  - /model@models.Random_Ensemble: random_ensemble
  - /model@models.Raw_SDT: raw_sdt
  - /model@models.Raw_XGBoost: raw_xgboost
  - /model@models.SelectKBest_SDT: selectkbest_sdt
  - /model@models.SelectKBest_XGBoost: selectkbest_xgboost
  - /model@models.FASTT_Boosted: fastt_boosted
  - /model@models.FASTT_Alternating: fastt_alternating
