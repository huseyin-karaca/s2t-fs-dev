site_name: S2T-FS
site_author: Hüseyin Karaca
repo_url: https://github.com/huseyin-karaca/s2t-fs-dev
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Model Catalog: models.md
  - Experimental Design:
      - Overview & 3-Tier Hierarchy: experiments.md
      - Orchestration & Parallelism: experiment_orchestration.md
      - Transform Experiments Rationale: synthetic_transforms_rationale.md
  - Experiment Tracking (MLflow): experiment-tracking.md
  - Remote Execution (Vast.ai): remote-execution.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
